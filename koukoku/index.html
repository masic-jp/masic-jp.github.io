<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子公告 — 一般社団法人 数理社会実装教育研究センター（MaSIC）</title>
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg: #ffffff;
      --c-text: #0f172a;
      --c-text-muted: #64748b;
      --c-primary: #0ea5e9;
      --c-primary-dark: #0284c7;
      --c-surface: #f8fafc;
      --c-border: #e2e8f0;
      --font-en: 'Inter', sans-serif;
      --font-ja: 'Noto Sans JP', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-en);
      color: var(--c-text);
      background-color: var(--c-bg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3 {
      font-family: var(--font-ja);
      line-height: 1.3;
      font-weight: 700;
    }

    p { font-family: var(--font-ja); }

    .nav {
      position: sticky;
      top: 0;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      z-index: 1000;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--c-text);
    }
    .nav-logo { height: 40px; width: auto; }
    .nav-title {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
    }
    .nav-back {
      font-family: var(--font-ja);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--c-text);
      text-decoration: none;
      padding: 0.6rem 1.25rem;
      border-radius: 999px;
      border: 1px solid var(--c-border);
      transition: all 0.3s;
    }
    .nav-back:hover {
      background: var(--c-text);
      color: #fff;
      border-color: var(--c-text);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 5%;
      position: relative;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 80% 20%, rgba(14, 165, 233, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(2, 132, 199, 0.04) 0%, transparent 40%);
      z-index: -1;
    }

    .notice {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }
    .notice-label {
      font-family: var(--font-en);
      font-weight: 800;
      color: var(--c-primary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: block;
    }
    .notice-title {
      font-size: clamp(1.5rem, 3.5vw, 2rem);
      font-weight: 700;
      margin-bottom: 2.5rem;
      color: var(--c-text);
      letter-spacing: 0.02em;
    }
    .notice-body {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 24px;
      padding: 3rem 2rem;
      font-size: 1.1rem;
      color: var(--c-text);
      font-weight: 500;
    }

    .footer {
      background: #0f172a;
      color: #94a3b8;
      padding: 3rem 5%;
      text-align: center;
      font-size: 0.9rem;
    }
    .footer-logo {
      height: 36px;
      margin-bottom: 1.25rem;
      opacity: 0.5;
      filter: grayscale(100%) brightness(200%);
    }

    @media (max-width: 600px) {
      .notice-body { padding: 2rem 1.25rem; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../" class="nav-brand">
      <img src="../logo-icon.png" alt="MaSIC Logo" class="nav-logo">
      <span class="nav-title">MaSIC</span>
    </a>
    <a href="../" class="nav-back">トップへ戻る</a>
  </nav>

  <main>
    <div class="bg"></div>
    <div class="notice">
      <span class="notice-label">Public Notice</span>
      <h1 class="notice-title">一般社団法人 数理社会実装教育研究センター 電子公告</h1>
      <div class="notice-body">
        <p>現在、公告すべき事項はありません。</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <img src="../logo-full.png" alt="MaSIC" class="footer-logo">
    <p>&copy; 2026 Mathematics for Social Implementation Center. All rights reserved.</p>
  </footer>

</body>
</html>
